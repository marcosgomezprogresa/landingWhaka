<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso Legal - Whaka Açaí</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .legal-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 20px 80px;
            line-height: 1.8;
        }
        .legal-page h1 {
            font-size: 2.5rem;
            color: #240046;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #240046 0%, #7B2CBF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .legal-page .last-updated {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .legal-page h2 {
            font-size: 1.5rem;
            color: #240046;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }
        .legal-page p {
            margin-bottom: 1rem;
            color: #4A5568;
        }
        .legal-page ul {
            margin: 1rem 0 1rem 2rem;
            color: #4A5568;
        }
        .legal-page li {
            margin-bottom: 0.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #7B2CBF;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body data-legal-page="legal">
    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" id="legalHomeLink" style="display: flex; align-items: center; gap: 0.5rem;">
                    <img src="images/logosinfondo.png" alt="Whaka Logo" class="logo-icon">
                    <img src="images/whakanombresinfondo.png" alt="Whaka" class="logo-text">
                </a>
            </div>
        </div>
    </header>

    <div class="legal-page">
        <a href="index.html" class="back-link" id="backToHomeLink">← Volver a la página principal</a>
        <div id="legalContent"></div>
    </div>

    <footer class="footer" style="margin-top: 4rem;">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; <span id="currentYear">2026</span> WAKA AÇAÍ. <span id="legalFooterRights">Todos los derechos reservados.</span></p>
                <div class="footer-legal">
                    <a href="aviso-legal.html" id="legalFooterLegal">Aviso Legal</a>
                    <a href="politica-privacidad.html" id="legalFooterPrivacy">Política de Privacidad</a>
                    <a href="politica-cookies.html" id="legalFooterCookies">Política de Cookies</a>
                </div>
            </div>
        </div>
    </footer>
    <script src="legal-pages.js"></script>
</body>
</html>
