<svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="200" height="60" fill="transparent"/>
  
  <!-- Açaí berry (círculo morado) -->
  <circle cx="30" cy="30" r="22" fill="#7B2CBF" opacity="0.9"/>
  <circle cx="30" cy="30" r="18" fill="#5A189A"/>
  <circle cx="26" cy="26" r="6" fill="#9D4EDD" opacity="0.6"/>
  
  <!-- Texto WAKA -->
  <text x="65" y="40" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#240046">
    <tspan fill="#7B2CBF">W</tspan><tspan>AKA</tspan>
  </text>
  
  <!-- Subtítulo açaí -->
  <text x="66" y="52" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#9D4EDD" letter-spacing="2">
    AÇAÍ PREMIUM
  </text>
</svg>